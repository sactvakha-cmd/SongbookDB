<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin - Akha Songbook</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Arimo&family=Arvo&family=Athiti&family=Bai+Jamjuree&family=Bitter&family=Cabin&family=Caveat&family=Chakra+Petch&family=Charm&family=Charmonman&family=Chathura&family=Chonburi&family=Crimson+Text&family=Dosis&family=Fahkwang&family=Fira+Sans&family=Fjalla+One&family=Hind&family=Inconsolata&family=Inter&family=Itim&family=Josefin+Sans&family=K2D&family=Kanit&family=KoHo&family=Kodchasan&family=Krub&family=Lato&family=Lora&family=Maitree&family=Mali&family=Merriweather&family=Mitr&family=Montserrat&family=Mukta&family=Mulish&family=Nanum+Myeongjo&family=Niramit&family=Noto+Sans&family=Noto+Sans+Thai&family=Noto+Serif+Thai&family=Nunito&family=Open+Sans&family=Oswald&family=Oxygen&family=PT+Sans&family=PT+Serif&family=Pacifico&family=Pattaya&family=Playfair+Display&family=Poppins&family=Pridi&family=Prompt&family=Raleway&family=Roboto&family=Roboto+Condensed&family=Roboto+Slab&family=Rubik&family=Sarabun&family=Signika&family=Slabo+27px&family=Sriracha&family=Srisakdi&family=Taviraj&family=Thasadith&family=Titillium+Web&family=Trirong&family=Ubuntu&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    :root { --primary: #f59e0b; --primary-glow: rgba(245, 158, 11, 0.3); }
    .nav-item.active { color: #f59e0b; }
    
    .container { max-width: 100% !important; padding: 15px !important; padding-bottom: 100px !important; }
    .reader-card { padding: 25px !important; border-radius: 12px; }
    
    @media (min-width: 768px) {
      .admin-form-grid { align-items: stretch; gap: 40px; } 
      .form-col-right { display: flex; flex-direction: column; height: 100%; border-left: 1px dashed #e2e8f0; padding-left: 40px;}
      .rich-editor { flex: 1; min-height: 60vh !important; margin-bottom: 0 !important; } 
    }
    
    .rich-editor { padding: 20px; border-radius: 0 0 12px 12px !important; outline: none; overflow-y: auto; font-size: 1.2rem; line-height: 2.0; }
    .admin-hide-scroll::-webkit-scrollbar { display: none; }
    .admin-hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    .admin-cat-btn { padding: 6px 16px; border-radius: 50px; border: 1px solid #e2e8f0; background: #f8fafc; color: #64748b; font-family: 'Kanit', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.3s ease; }
    .admin-cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px var(--primary-glow); }
  </style>
</head>
<body>
  <div id="toast" class="toast"><i class="fa-solid fa-circle-check"></i> <span id="toast-msg">ข้อความ</span></div>
  <div id="loader" class="loader-container"><div class="spinner"></div><h2 style="color:var(--text-main);" id="loader-text">กำลังโหลด...</h2></div>

  <div id="view-login" class="auth-wrapper hidden">
    <div class="auth-card" style="border-top: 5px solid #f59e0b;">
      <div class="auth-icon" style="color: #f59e0b;"><i class="fa-solid fa-user-shield"></i></div>
      <h2 style="margin-bottom: 5px;">ระบบจัดการหลังบ้าน</h2>
      <p class="auth-desc">Akha Songbook Admin</p>
      <div class="search-container"><i class="fa-solid fa-lock"></i><input type="password" id="admin-pass" placeholder="รหัสผ่านผู้ดูแลระบบ"></div>
      <button class="btn-primary" onclick="loginAdmin()" style="width:100%; margin-top:10px; background:#f59e0b;">เข้าสู่ระบบ</button>
    </div>
  </div>

  <div id="app" class="container hidden">
    
    <div id="view-dashboard" class="fade-in">
      <div class="top-bar">
        <h2><i class="fa-solid fa-music"></i> จัดการเพลง</h2>
        <button class="btn-icon" style="background:#f59e0b; color:white; border:none;" onclick="openAdminForm()"><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="search-container"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="song-search" placeholder="ค้นหาเพลง..." oninput="searchSongs()"></div>
      
      <div class="admin-hide-scroll" style="display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px;">
        <button class="admin-cat-btn active" data-cat="ALL" onclick="filterAdminCat('ALL')">ทั้งหมด</button>
        <button class="admin-cat-btn" data-cat="เพลงชีวิตคริสเตียนอาข่า" onclick="filterAdminCat('เพลงชีวิตคริสเตียนอาข่า')">ชีวิตคริสเตียนอาข่า</button>
        <button class="admin-cat-btn" data-cat="เพลงคริสเตียนทั่วไป" onclick="filterAdminCat('เพลงคริสเตียนทั่วไป')">คริสเตียนทั่วไป</button>
        <button class="admin-cat-btn" data-cat="เพลงคริสต์มาส" onclick="filterAdminCat('เพลงคริสต์มาส')">คริสต์มาส</button>
        <button class="admin-cat-btn" data-cat="เพลงสรรเสริญ" onclick="filterAdminCat('เพลงสรรเสริญ')">สรรเสริญ</button>
        <button class="admin-cat-btn" data-cat="เพลงงานมงคลสมรส" onclick="filterAdminCat('เพลงงานมงคลสมรส')">มงคลสมรส</button>
        <button class="admin-cat-btn" data-cat="เพลงไว้อาลัย" onclick="filterAdminCat('เพลงไว้อาลัย')">ไว้อาลัย</button>
      </div>

      <div id="song-list"></div>
    </div>

    <div id="view-admin-form" class="hidden fade-in">
      <div class="top-bar">
        <button class="btn-icon" onclick="switchView('dashboard')"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 id="admin-title" style="flex:1; text-align:center;">เพิ่มเพลงใหม่</h2>
        <button class="btn-primary" style="width: auto; padding: 10px 20px; font-size: 0.95rem; border-radius: 50px; background:#10b981;" id="btn-save-top" onclick="saveSong()"><i class="fa-solid fa-check"></i> บันทึก</button>
      </div>
      
      <div class="reader-card form-group">
        <input type="hidden" id="form-id">
        <div class="admin-form-grid">
          
          <div class="form-col-left">
            <label>หมวดหมู่ <span style="color:red">*</span></label>
            <select id="form-cat">
              <option value="เพลงชีวิตคริสเตียนอาข่า">เพลงชีวิตคริสเตียนอาข่า</option>
              <option value="เพลงคริสเตียนทั่วไป">เพลงคริสเตียนทั่วไป</option>
              <option value="เพลงคริสต์มาส">เพลงคริสต์มาส</option>
              <option value="เพลงไว้อาลัย">เพลงไว้อาลัย</option>
              <option value="เพลงงานมงคลสมรส">เพลงงานมงคลสมรส</option>
              <option value="เพลงสรรเสริญ">เพลงสรรเสริญ</option>
            </select>
            
            <label>ชื่อเพลง (อาข่า/ไทย) <span style="color:red">*</span></label>
            <input type="text" id="form-title" placeholder="พิมพ์ชื่อเพลง...">
            
            <div id="eng-title-group">
              <label>ชื่อเพลงภาษาอังกฤษ <span style="color:var(--text-muted); font-size:0.8rem;">(ถ้ามี)</span></label>
              <input type="text" id="form-eng-title" placeholder="English title...">
            </div>
            
            <label>ผู้แต่ง / เรียบเรียง</label>
            <input type="text" id="form-author" placeholder="เว้นว่างได้...">
            
            <div style="display:flex; gap:10px;">
              <div style="flex:1;"><label>คอร์ดกีตาร์</label><input type="text" id="form-chords" placeholder="เช่น G, C..."></div>
              <div style="flex:1;"><label>โน้ต/Key/จังหวะ</label><input type="text" id="form-notation" placeholder="d d m Key E 4/4"></div>
            </div>
            
            <hr class="pc-hidden-hr" style="border:0; border-top:1px dashed #cbd5e1; margin:15px 0;">
            
            <label>🔗 ไฟล์เสียง MP3 / อัดเสียงร้อง (ถ้ามี)</label>
            <div style="display:flex; gap:10px; margin-bottom:5px;">
              <input type="text" id="form-audio" placeholder="วางลิงก์ หรืออัปโหลด/อัดเสียง..." style="margin-bottom:0; flex:1;">
              
              <label class="btn-primary" style="display:flex; align-items:center; justify-content:center; cursor:pointer; padding: 0 15px; border-radius: 8px; font-size: 0.9rem; background:#3b82f6;" title="อัปโหลดไฟล์ MP3">
                <i class="fa-solid fa-upload"></i>
                <input type="file" accept="audio/*" style="display:none;" onchange="uploadMedia(event, 'form-audio', 'audio')">
              </label>
              
              <button class="btn-primary record-btn" id="btn-record-audio" type="button" style="display:flex; align-items:center; justify-content:center; padding: 0 15px; border-radius: 8px; font-size: 0.9rem; background:#ef4444; border:none; transition: all 0.3s ease;" onclick="toggleRecording()" title="อัดเสียงจากไมค์">
                <i class="fa-solid fa-microphone"></i>
              </button>
            </div>
            
            <div id="audio-preview-box" class="hidden" style="background:#f1f5f9; border:1px solid #e2e8f0; border-radius:8px; padding:10px; margin-bottom:15px; display:flex; flex-direction:column; gap:10px;">
              <div style="font-size:0.85rem; color:var(--text-muted); font-weight:bold;">🎧 ลองฟังเสียงที่อัดไว้:</div>
              <audio id="audio-preview-element" controls style="width:100%; height:40px; outline:none;"></audio>
              <div style="display:flex; gap:10px;">
                <button type="button" class="btn-primary" style="flex:1; background:#10b981; font-size:0.85rem; padding:8px; border-radius:6px; box-shadow:none;" onclick="uploadRecordedAudio()"><i class="fa-solid fa-cloud-arrow-up"></i> ยืนยันและอัปโหลด</button>
                <button type="button" class="btn-primary" style="flex:1; background:#94a3b8; font-size:0.85rem; padding:8px; border-radius:6px; box-shadow:none;" onclick="cancelRecordedAudio()"><i class="fa-solid fa-trash-can"></i> ลบทิ้ง/อัดใหม่</button>
              </div>
            </div>
            
            <label>🌐 ลิงก์ภายนอก (YouTube / ข้อมูลเพิ่มเติม)</label>
            <input type="text" id="form-link" placeholder="วางลิงก์เว็บ หรือ YouTube">
            
            <label>🖼️ ลิงก์รูปภาพเนื้อเพลง / โน้ตเพลง (ถ้ามี)</label>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
              <input type="text" id="form-image" placeholder="วางลิงก์ หรืออัปโหลดรูป..." style="margin-bottom:0; flex:1;">
              <label class="btn-primary" style="display:flex; align-items:center; justify-content:center; cursor:pointer; padding: 0 15px; border-radius: 8px; font-size: 0.9rem; background:#3b82f6;">
                <i class="fa-solid fa-upload"></i>
                <input type="file" accept="image/*" style="display:none;" onchange="uploadMedia(event, 'form-image', 'image')">
              </label>
            </div>
            
            <label style="margin-top:5px; display:block;">ข้อพระคัมภีร์ / แรงบันดาลใจ</label>
            <textarea id="form-inspiration" rows="3" placeholder="เช่น สดุดี 23:1..."></textarea>
          </div>

          <div class="form-col-right">
            <label style="color:var(--primary); font-weight:bold; display:block; margin-bottom:5px;">ระบุข้อมูลเนื้อเพลง <span style="color:red">*</span></label>
            
            <div class="lyrics-toggle" style="margin: 0 0 15px 0; width: 100%; display: flex; justify-content: space-between;">
              <button class="lyrics-toggle-btn active" id="btn-edit-lyric-old" onclick="switchAdminLyricView('old')" style="flex:1; border-radius:8px;">อาข่าแบบเก่า (ข้อมูลเดิม)</button>
              <button class="lyrics-toggle-btn" id="btn-edit-lyric-new" onclick="switchAdminLyricView('new')" style="flex:1; border-radius:8px;">อาข่าแบบใหม่</button>
            </div>
            
            <div id="main-editor-toolbar" class="editor-toolbar">
              
              <!-- คืนค่ารายชื่อฟอนต์ทั้งหมด 100% ตรงนี้ครับ -->
              <select class="editor-select" onchange="formatTextAdmin('fontName', this.value)" style="width:auto; min-width:110px;">
                <option value="">-- รูปแบบ --</option>
                <option value="'Nanum Myeongjo', serif">ฟอนต์เนื้อเพลง</option>
                <option value="'Kanit', sans-serif">ฟอนต์ระบบ (Kanit)</option>
                <option value="sans-serif">มาตรฐาน</option>
                <option value="'Athiti', sans-serif">Athiti (อธิติ)</option>
                <option value="'Bai Jamjuree', sans-serif">Bai Jamjuree (ใบจามจุรี)</option>
                <option value="'Chakra Petch', sans-serif">Chakra Petch (จักรเพชร)</option>
                <option value="'Charm', cursive">Charm (ชาร์ม)</option>
                <option value="'Charmonman', cursive">Charmonman (ชาร์มอนแมน)</option>
                <option value="'Chathura', sans-serif">Chathura (จตุรัส)</option>
                <option value="'Chonburi', cursive">Chonburi (ชลบุรี)</option>
                <option value="'Fahkwang', sans-serif">Fahkwang (ฟ้ากว้าง)</option>
                <option value="'Itim', cursive">Itim (ไอติม)</option>
                <option value="'K2D', sans-serif">K2D (เคทูดี)</option>
                <option value="'Kanit', sans-serif">Kanit (คณิต)</option>
                <option value="'KoHo', sans-serif">KoHo (โคโฮ)</option>
                <option value="'Kodchasan', sans-serif">Kodchasan (คชสาร)</option>
                <option value="'Krub', sans-serif">Krub (ครับ)</option>
                <option value="'Maitree', serif">Maitree (ไมตรี)</option>
                <option value="'Mali', cursive">Mali (มะลิ)</option>
                <option value="'Mitr', sans-serif">Mitr (มิตร)</option>
                <option value="'Niramit', sans-serif">Niramit (นิรมิต)</option>
                <option value="'Noto Sans Thai', sans-serif">Noto Sans Thai</option>
                <option value="'Noto Serif Thai', serif">Noto Serif Thai</option>
                <option value="'Pattaya', sans-serif">Pattaya (พัทยา)</option>
                <option value="'Pridi', serif">Pridi (ปรีดี)</option>
                <option value="'Prompt', sans-serif">Prompt (พร้อม)</option>
                <option value="'Sarabun', sans-serif">Sarabun (สารบรรณ)</option>
                <option value="'Sriracha', cursive">Sriracha (ศรีราชา)</option>
                <option value="'Srisakdi', cursive">Srisakdi (ศรีศักดิ์)</option>
                <option value="'Taviraj', serif">Taviraj (ทวิราช)</option>
                <option value="'Thasadith', sans-serif">Thasadith (ทัสดิธ)</option>
                <option value="'Trirong', serif">Trirong (ไตรรงค์)</option>
                <option value="'Roboto', sans-serif">Roboto</option>
                <option value="'Open Sans', sans-serif">Open Sans</option>
                <option value="'Lato', sans-serif">Lato</option>
                <option value="'Montserrat', sans-serif">Montserrat</option>
                <option value="'Oswald', sans-serif">Oswald</option>
                <option value="'Source Sans Pro', sans-serif">Source Sans Pro</option>
                <option value="'Slabo 27px', serif">Slabo 27px</option>
                <option value="'Raleway', sans-serif">Raleway</option>
                <option value="'PT Sans', sans-serif">PT Sans</option>
                <option value="'Merriweather', serif">Merriweather</option>
                <option value="'Roboto Condensed', sans-serif">Roboto Condensed</option>
                <option value="'Noto Sans', sans-serif">Noto Sans</option>
                <option value="'Ubuntu', sans-serif">Ubuntu</option>
                <option value="'Roboto Slab', serif">Roboto Slab</option>
                <option value="'Lora', serif">Lora</option>
                <option value="'Playfair Display', serif">Playfair Display</option>
                <option value="'Nunito', sans-serif">Nunito</option>
                <option value="'Poppins', sans-serif">Poppins</option>
                <option value="'Arimo', sans-serif">Arimo</option>
                <option value="'Titillium Web', sans-serif">Titillium Web</option>
                <option value="'Muli', sans-serif">Muli</option>
                <option value="'PT Serif', serif">PT Serif</option>
                <option value="'Mukta', sans-serif">Mukta</option>
                <option value="'Rubik', sans-serif">Rubik</option>
                <option value="'Bitter', serif">Bitter</option>
                <option value="'Anton', sans-serif">Anton</option>
                <option value="'Fira Sans', sans-serif">Fira Sans</option>
                <option value="'Dosis', sans-serif">Dosis</option>
                <option value="'Inconsolata', monospace">Inconsolata</option>
                <option value="'Oxygen', sans-serif">Oxygen</option>
                <option value="'Fjalla One', sans-serif">Fjalla One</option>
                <option value="'Hind', sans-serif">Hind</option>
                <option value="'Josefin Sans', sans-serif">Josefin Sans</option>
                <option value="'Cabin', sans-serif">Cabin</option>
                <option value="'Arvo', serif">Arvo</option>
                <option value="'Crimson Text', serif">Crimson Text</option>
                <option value="'Signika', sans-serif">Signika</option>
                <option value="'Pacifico', cursive">Pacifico</option>
                <option value="'Inter', sans-serif">Inter</option>
                <option value="'Caveat', cursive">Caveat</option>
              </select>
              
              <select class="editor-select" onchange="formatTextAdmin('fontSize', this.value)" style="width:auto; min-width:85px;">
                <option value="">-- ขนาด --</option>
                <option value="1">เล็กสุด</option><option value="2">เล็ก</option><option value="3">ปกติ</option>
                <option value="4">ใหญ่</option><option value="5">ใหญ่มาก</option><option value="6">ยักษ์</option>
              </select>
              <div class="editor-divider"></div>

              <button class="editor-btn" type="button" onmousedown="event.preventDefault();" onclick="formatTextAdmin('bold')" title="ตัวหนา"><i class="fa-solid fa-bold"></i></button>
              <button class="editor-btn" type="button" onmousedown="event.preventDefault();" onclick="formatTextAdmin('italic')" title="ตัวเอียง"><i class="fa-solid fa-italic"></i></button>
              <button class="editor-btn" type="button" onmousedown="event.preventDefault();" onclick="formatTextAdmin('underline')" title="ขีดเส้นใต้"><i class="fa-solid fa-underline"></i></button>
              <div class="editor-divider"></div>

              <button class="editor-btn" type="button" onmousedown="event.preventDefault();" onclick="formatTextAdmin('justifyLeft')" title="ชิดซ้าย"><i class="fa-solid fa-align-left"></i></button>
              <button class="editor-btn" type="button" onmousedown="event.preventDefault();" onclick="formatTextAdmin('justifyCenter')" title="กึ่งกลาง"><i class="fa-solid fa-align-center"></i></button>
              <button class="editor-btn" type="button" onmousedown="event.preventDefault();" onclick="formatTextAdmin('justifyRight')" title="ชิดขวา"><i class="fa-solid fa-align-right"></i></button>
              <div class="editor-divider"></div>
              
              <button class="editor-btn" type="button" onmousedown="event.preventDefault();" onclick="formatTextAdmin('removeFormat')" title="ล้างรูปแบบ"><i class="fa-solid fa-eraser"></i></button>
            </div>
            
            <div id="form-lyrics-old" class="rich-editor" contenteditable="true" style="text-align: center;"></div>
            <div id="form-lyrics-new" class="rich-editor hidden" contenteditable="true" style="text-align: center;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ส่วนของการจัดการผู้ใช้ (Admin User Form) -->
    <div id="view-users" class="hidden fade-in">
      <div class="top-bar">
        <h2><i class="fa-solid fa-users"></i> ผู้ใช้งาน</h2>
        <button class="btn-icon" style="background:#f59e0b; color:white; border:none;" onclick="openUserForm()"><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="search-container"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="user-search" placeholder="ค้นหาเบอร์ หรือ ชื่อ..." oninput="searchUsers()"></div>
      <div id="user-list"></div>
    </div>

    <div id="view-user-form" class="hidden fade-in">
      <div class="top-bar">
        <button class="btn-icon" onclick="switchView('users')"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 id="user-form-title" style="flex:1; text-align:center;">เพิ่มผู้ใช้ใหม่</h2>
        <button class="btn-primary" style="width: auto; padding: 10px 20px; font-size: 0.95rem; border-radius: 50px; background:#10b981;" onclick="saveUser()"><i class="fa-solid fa-check"></i> บันทึก</button>
      </div>
      <div class="reader-card form-group">
        <input type="hidden" id="form-user-is-edit" value="false">
        <label>เบอร์โทรศัพท์ (ไอดีเข้าสู่ระบบ) <span style="color:red">*</span></label><input type="tel" id="form-user-phone" maxlength="10">
        <label>รหัสผ่าน (PIN) <span style="color:red">*</span></label><input type="text" id="form-user-pin" maxlength="6">
        <label>ชื่อผู้ใช้งาน</label><input type="text" id="form-user-name">
        
        <label>จำนวนรอบที่ต่ออายุ</label>
        <div style="display:flex; gap:10px; margin-bottom:15px;">
          <input type="number" id="form-user-count" min="1" style="flex:1;">
          <button class="btn-primary" type="button" style="background:#f1f5f9; color:var(--text-main); font-size:0.9rem;" onclick="document.getElementById('form-user-count').value = parseInt(document.getElementById('form-user-count').value || 0) + 1">+1 รอบ</button>
        </div>

        <div id="form-user-slip-box" class="hidden" style="margin-bottom: 15px; padding: 10px; background: rgba(16, 185, 129, 0.1); border-radius: 8px;">
          <a id="form-user-slip-link" href="#" target="_blank" class="btn-link" style="background:#10b981; width:100%; text-align:center;"><i class="fa-solid fa-image"></i> กดดูสลิปโอนเงิน</a>
        </div>
        
        <label>วันหมดอายุ <span style="color:red">*</span></label><input type="date" id="form-user-expiry" style="padding-left:16px;">
        <div style="display:flex; gap:10px; margin-bottom: 20px;">
          <button class="btn-primary" type="button" style="flex:1; background:#10b981; color:white; font-size:0.9rem;" onclick="approveUserQuick(30)"><i class="fa-solid fa-check"></i> อนุมัติ 1 เดือน</button>
          <button class="btn-primary" type="button" style="flex:1; background:#2563eb; color:white; font-size:0.9rem;" onclick="approveUserQuick(365)"><i class="fa-solid fa-check-double"></i> อนุมัติ 1 ปี</button>
        </div>
      </div>
    </div>

  </div>
